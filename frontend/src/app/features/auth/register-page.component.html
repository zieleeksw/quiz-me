<main class="app-shell">
  <div class="app-panel auth-page auth-page--register">
    <app-auth-card
      eyebrow="Create Account"
      title="Start your quiz journey."
      description="Create your account to save progress, track your wins, and come back whenever the next challenge calls."
    >
      <form class="app-form" novalidate>
        <div class="app-field">
          <label for="register-email">Email address</label>
          <input
            id="register-email"
            class="app-input"
            type="email"
            placeholder="quiz.master@example.com"
          />
        </div>

        <div class="app-field">
          <label for="register-password">Password</label>
          <input
            id="register-password"
            class="app-input"
            type="password"
            placeholder="At least 12 characters"
          />
        </div>

        <div class="app-field">
          <label for="register-confirm-password">Confirm password</label>
          <input
            id="register-confirm-password"
            class="app-input"
            type="password"
            placeholder="Repeat your password"
          />
        </div>
      </form>

      <div class="auth-page__actions">
        <app-action-button
          label="Create Account"
          routerLink="/register"
        />

        <a class="app-muted-link" routerLink="/login">Already have an account? Log in.</a>
      </div>
    </app-auth-card>
  </div>
</main>
